name: iExplain Setup and Test
on: [push, workflow_dispatch]

jobs:
  iexplain-test:
    runs-on: ubuntu-latest
    steps:
      - name: Install uv
        run: pipx install uv

      - name: Clone iExplain repository
        run: git clone https://github.com/INTEND-Project/iExplain.git

      - name: Install dependencies
        run: |
          cd iExplain
          uv sync
          uv pip install -e ".[dev]"

      - name: Start GraphDB
        run: |
          cd iExplain
          docker compose -f lab/intent_graphdb/compose.yaml up -d
          for i in {1..30}; do
            if wget -q -O - http://localhost:7200/rest/repositories >/dev/null 2>&1; then
              echo "GraphDB is up!"
              break
            fi
            echo "Waiting for GraphDB..."
            sleep 5
          done

      - name: Seed GraphDB
        run: |
          cd iExplain
          uv run python3 lab/intent_graphdb/seed_graphdb.py --reset

      - name: Run intent-summary
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IEXPLAIN_INTENT_GRAPHDB_URL: "http://localhost:7200"
          IEXPLAIN_INTENT_GRAPHDB_REPOSITORY: "intents_and_intent_reports"
        run: |
          cd iExplain
          uv run python3 -m iexplain intent-summary If9587ca040be457d908d54e7aecc2ef6
