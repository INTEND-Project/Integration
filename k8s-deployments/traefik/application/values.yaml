traefik:

  deployment:
    replicas: 2

  ingressClass:
    enabled: true
    isDefaultClass: false
    name: traefik

  providers:
    kubernetesCRD:
      enabled: true

    kubernetesIngress:
      enabled: true
      ingressClass: traefik

  ingressRoute:
    dashboard:
      enabled: false

  service:
    type: LoadBalancer

  ports:

    web:
      port: 8000
      exposedPort: 80
      expose:
        default: true
      redirectTo:
        port: websecure

    websecure:
      port: 8443
      exposedPort: 443
      expose:
        default: true
      tls:
        enabled: true

  logs:
    general:
      level: INFO

  additionalArguments:
    - "--serversTransport.insecureSkipVerify=false"

  tlsStore:
    default:
      defaultCertificate:
        secretName: ""

  persistence:
    enabled: false