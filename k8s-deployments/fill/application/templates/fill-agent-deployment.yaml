apiVersion: apps/v1
kind: Deployment
metadata:
  name: fill-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fill-agent
  template:
    metadata:
      labels:
        app: fill-agent
    spec:
      containers:
        - name: fill-agent
          image: {{ .Values.fillAgent.image }}
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
          ports:
            - containerPort: {{ .Values.fillAgent.port }}