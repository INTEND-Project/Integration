apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuer.name }}
spec:
  acme:
    email: {{ required "issuer.email must be provided by Argo CD" .Values.issuer.email | quote }}

    server: {{ .Values.issuer.server | quote }}

    privateKeySecretRef:
      name: {{ .Values.issuer.privateKeySecretRef }}

    solvers:
      - http01:
          ingress:
            ingressClassName: {{ .Values.issuer.ingressClassName }}